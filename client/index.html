<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com https://maps.googleapis.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' https: data: blob:;
      media-src 'self' https: data: blob:;
      connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://maps.googleapis.com;
      frame-src 'self';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests;
    ">

    <!-- Primary SEO -->
    <title>UK Sabor - Latin Dance Events, Courses & Classes</title>
    <meta name="description" content="Join UK Sabor for unforgettable Latin dance events, professional online courses, and live classes in the UK. Learn Salsa, Bachata and more from world-class instructors." />
    <meta name="keywords" content="UK Sabor, Latin dance, Salsa, Bachata, dance events UK, dance courses, dance classes, online dance lessons" />
    <meta name="author" content="UK Sabor" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://uksabor.com" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://uksabor.com" />
    <meta property="og:title" content="UK Sabor - Latin Dance Events, Courses & Classes" />
    <meta property="og:description" content="Join UK Sabor for unforgettable Latin dance events, professional online courses, and live classes. Learn from world-class instructors." />
    <meta property="og:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663400274503/DGihaPaJvnMFHruoq9jmVQ/sabor-logo_7c905b38.png" />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:site_name" content="UK Sabor" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="UK Sabor - Latin Dance Events, Courses & Classes" />
    <meta name="twitter:description" content="Join UK Sabor for unforgettable Latin dance events, professional online courses, and live classes." />
    <meta name="twitter:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663400274503/DGihaPaJvnMFHruoq9jmVQ/sabor-logo_7c905b38.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#E91E8C" />

    <!-- Fonts - preconnect and preload for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Analytics (Umami) - Uncomment and set VITE_ANALYTICS_* vars in .env to enable -->
    <!-- <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script> -->
  </body>

</html>
